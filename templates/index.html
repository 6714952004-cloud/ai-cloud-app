<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}
#chat{
width:400px;
margin:auto;
}
input{
width:70%;
padding:10px;
}
button{
padding:10px;
}
</style>
</head>

<body>

<h1>AI Chat</h1>

<div id="chat">
<input id="text" placeholder="พิมพ์ข้อความ">
<button onclick="send()">Send</button>

<p id="response"></p>
</div>

<script>

async function send(){

let text=document.getElementById("text").value

let res=await fetch("/ai?text="+text)

let data=await res.json()

document.getElementById("response").innerText=data.response

}

</script>

</body>
</html>
